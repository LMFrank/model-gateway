services:
  model-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${GATEWAY_CONTAINER_NAME:-model-gateway}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    labels:
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.enabled=true"
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.logs=true"
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.metrics.path=/metrics"
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.metrics.port=8080"
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.service=model-gateway-api"
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.env=${APP_ENV:-prod}"
    volumes:
      - ${KIMI_HOME_DIR:-./runtime/kimi-home}:/root/.kimi
      - ${CODEX_HOME_DIR:-./runtime/codex-home}:/root/.codex
      - ./app:/app/app:ro
    networks:
      - gateway_shared
      - gateway_db
      - observability

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${GATEWAY_CONTAINER_NAME:-model-gateway}-ui
    restart: unless-stopped
    ports:
      - "${GATEWAY_UI_PORT:-8620}:80"
    labels:
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.enabled=true"
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.logs=true"
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.service=model-gateway-ui"
      - "${OBSERVABILITY_LABEL_PREFIX:-observability}.env=${APP_ENV:-prod}"
    networks:
      - gateway_shared
      - observability
    depends_on:
      - model-gateway

networks:
  gateway_shared:
    external: true
    name: ${GATEWAY_DOCKER_NETWORK:-gateway_shared_net}
  gateway_db:
    external: true
    name: ${DB_DOCKER_NETWORK:-gateway_shared_net}
  observability:
    external: true
    name: ${OBSERVABILITY_DOCKER_NETWORK:-observability_net}
