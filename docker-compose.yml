services:
  model-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${GATEWAY_CONTAINER_NAME:-model-gateway}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ${KIMI_HOME_DIR:-./runtime/kimi-home}:/root/.kimi
      - ${CODEX_HOME_DIR:-./runtime/codex-home}:/root/.codex
      - ./app:/app/app:ro
    networks:
      - gateway_shared
      - gateway_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${GATEWAY_CONTAINER_NAME:-model-gateway}-ui
    restart: unless-stopped
    ports:
      - "${GATEWAY_UI_PORT:-3001}:80"
    networks:
      - gateway_shared
    depends_on:
      - model-gateway

networks:
  gateway_shared:
    external: true
    name: ${GATEWAY_DOCKER_NETWORK:-gateway_shared_net}
  gateway_db:
    external: true
    name: ${DB_DOCKER_NETWORK:-gateway_shared_net}
