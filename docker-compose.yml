services:
  model-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${GATEWAY_CONTAINER_NAME:-model-gateway}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    labels:
      monitor.enabled: "true"
      monitor.logs: "true"
      monitor.metrics.path: "/metrics"
      monitor.metrics.port: "8080"
      monitor.service: "model-gateway-api"
      monitor.env: "${APP_ENV:-prod}"
    volumes:
      - ${KIMI_HOME_DIR:-./runtime/kimi-home}:/root/.kimi
      - ${CODEX_HOME_DIR:-./runtime/codex-home}:/root/.codex
      - ./app:/app/app:ro
    networks:
      - gateway_shared
      - gateway_db
      - ai_monitor_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${GATEWAY_CONTAINER_NAME:-model-gateway}-ui
    restart: unless-stopped
    ports:
      - "${GATEWAY_UI_PORT:-8620}:80"
    labels:
      monitor.enabled: "true"
      monitor.logs: "true"
      monitor.service: "model-gateway-ui"
      monitor.env: "${APP_ENV:-prod}"
    networks:
      - gateway_shared
      - ai_monitor_net
    depends_on:
      - model-gateway

networks:
  gateway_shared:
    external: true
    name: ${GATEWAY_DOCKER_NETWORK:-gateway_shared_net}
  gateway_db:
    external: true
    name: ${DB_DOCKER_NETWORK:-gateway_shared_net}
  ai_monitor_net:
    external: true
    name: ai_monitor_net
